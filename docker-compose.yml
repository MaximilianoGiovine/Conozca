version: '3.9'

services:
  # ========================================== #
  # 1. MOTOR DE BASE DE DATOS                  #
  # ========================================== #
  postgres:
    image: supabase/postgres:15.1.1.75
    container_name: conozca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conozca_dev_password_change_me_in_vps}
      POSTGRES_HOST_AUTH_METHOD: "trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Inyecta todas las migraciones contenidas en la carpeta de Supabase al iniciar por primera vez.
      - ./supabase/migrations:/docker-entrypoint-initdb.d/
    # Sin mapeo de puertos al host: la DB solo es accesible desde la red interna Docker (más seguro)
    networks:
      - conozca-net

  # ========================================== #
  # 2. MICROSERVICIO: API DE BASE DE DATOS     #
  # ========================================== #
  postgrest:
    image: postgrest/postgrest:v11.2.0
    container_name: conozca-postgrest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      # El microservicio se conecta de forma segura dentro de la red
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-conozca_dev_password_change_me_in_vps}@postgres:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-this-super-secret-jwt-token-must-be-min-32-chars-long}
    networks:
      - conozca-net

  # ========================================== #
  # 3. MICROSERVICIO: AUTENTICACIÓN (GO TRUE)  #
  # ========================================== #
  gotrue:
    image: supabase/gotrue:v2.132.3
    container_name: conozca-gotrue
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD:-conozca_dev_password_change_me_in_vps}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://tu-dominio.com}
      GOTRUE_URI_ALLOW_LIST: ${CORS_ORIGIN:-http://localhost,http://tu-dominio.com}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-this-super-secret-jwt-token-must-be-min-32-chars-long}
      GOTRUE_JWT_EXP: 3600
      
      # Desactivar SMTP por defecto para local, o configurarlos en .env del VPS
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Conozca}
    networks:
      - conozca-net

  # ========================================== #
  # 4. MICROSERVICIO: API GATEWAY (PROXY)      #
  # ========================================== #
  gateway:
    image: nginx:alpine
    container_name: conozca-gateway
    restart: unless-stopped
    ports:
      # Puerto de entrada principal del VPS. Mapear a 80 y/o 443.
      - "80:80"
    volumes:
      - ./api-gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gotrue
      - postgrest
    networks:
      - conozca-net

  # ========================================== #
  # 5. FRONTEND: NEXT.JS APP                   #
  # ========================================== #
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conozca-frontend
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      NODE_ENV: production
      # El frontend SSR se comunicará con el Gateway Unificado local
      NEXT_PUBLIC_SUPABASE_URL: http://gateway:80
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.dummy_signature_change_me}
    ports:
      - "3000:3000"
    networks:
      - conozca-net

networks:
  conozca-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local