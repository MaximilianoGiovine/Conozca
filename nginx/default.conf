# Define las zonas de memoria y parámetros de Rate Limiting (Protección contra DDoS y Brute-forcing)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

server {
    listen 80;
    server_name localhost;

    # Ocultar la versión de Ngnix por seguridad
    server_tokens off;

    # ========================================================
    # 🛡️ HTTP SECURITY HEADERS (Defensa Activa en navegador)
    # ========================================================
    add_header X-Frame-Options "SAMEORIGIN" always;                     # Bloquea Clickjacking (no pueden meter tu app en un iframe falso)
    add_header X-XSS-Protection "1; mode=block" always;                 # Fuerza al navegador a bloquear ataques XSS reflejados
    add_header X-Content-Type-Options "nosniff" always;                 # Evita que el cliente invente MIME types maliciosos
    add_header Referrer-Policy "no-referrer-when-downgrade" always;     # Protege fugas de URL en la navegación
    add_header Strict-Transport-Security "max-age=31536000" always;     # (HSTS) Obliga al usuario a usar HTTPS siempre
    # ========================================================

    # ========================================================
    # 🛡️ PROTECCIÓN ANTI-SLOWLORIS Y TIMEOUTS POR RÁFAGAS
    # ========================================================
    # Cierra conexiones de clientes que demoren mucho en enviar su body/headers (Timeouts)
    client_body_timeout 10s;       # Máximo tiempo para recibir el cuerpo de la petición (prevención de ataques lentos)
    client_header_timeout 10s;     # Máximo tiempo para recibir los headers enteros
    keepalive_timeout 15s;         # Cuánto tiempo mantenemos la conexión viva antes de soltarla
    send_timeout 10s;              # Cuánto espera nginx a que el cliente reciba la respuesta de bajada

    # Limitar tamaño estricto de los envíos de datos (Previene Subidas/Envios desbordantes de RAM)
    client_max_body_size 5M;       # Máximo payload de subida (Ajustar si permites avatares pesados)
    # ========================================================

    # ========================================================
    # 📄 REVISTAS EN PDF (Archivos estáticos desde volumen)
    # ========================================================
    location /revistas/pdfs/ {
        alias /opt/revistas/;
        add_header Content-Disposition "inline";
        # PDFs son archivos públicos — se permite incrustar en iframe desde cualquier origen
        # (el X-Frame-Options SAMEORIGIN del server block bloquearía el iframe cross-port)
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        sendfile on;
        tcp_nopush on;
    }
    # ========================================================

    # Frontend (Next.js Standalone SSR)
    location / {
        proxy_pass http://conozca-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Microservicio: PostgREST API
    location /rest/v1 {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        # Timeouts estrictos del proxy interno para proteger las consultas de DB atascadas
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        proxy_pass http://conozca-postgrest:3000;
        proxy_set_header Host $host;
        rewrite ^/rest/v1/(.*)$ /$1 break;
    }

    # Microservicio: GoTrue Auth API
    location /auth/v1 {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        proxy_pass http://conozca-gotrue:9999;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        rewrite ^/auth/v1/(.*)$ /$1 break;
    }
}
